name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: xxxxxvx
          outputs: |
            dist/snake.svg?palette=github-dark
            dist/snake-gray.svg?color_snake=8b3a3a&color_dots=#080608,#1e0a0a,#3a1010,#5a2020,#8b3a3a
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}